<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Awesome Pizza API - Documentation</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      const spec = {
  "openapi": "3.0.3",
  "info": {
    "title": "Awesome Pizza API",
    "description": "REST API for the Awesome Pizza ordering application. Allows clients to browse the daily menu, place orders, look up orders, and manage order status transitions.\n\n**Order Status Flow:**\n```\nRECEIVED → DELIVERING → DELIVERED\nRECEIVED → CANCELED\n```",
    "version": "1.0.0",
    "contact": {
      "name": "Awesome Pizza"
    }
  },
  "servers": [
    {
      "url": "http://localhost:3000",
      "description": "Local development server"
    }
  ],
  "tags": [
    { "name": "Menu", "description": "Daily menu operations" },
    { "name": "Orders", "description": "Order placement and management" }
  ],
  "paths": {
    "/api/daily-menu": {
      "get": {
        "tags": ["Menu"],
        "summary": "Get daily menu",
        "description": "Returns the list of pizza items available for today. Always returns exactly 5 items.",
        "operationId": "getDailyMenu",
        "responses": {
          "200": {
            "description": "List of available pizza items",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": { "type": "boolean", "example": true },
                    "data": { "type": "array", "items": { "$ref": "#/components/schemas/MenuItem" } }
                  }
                }
              }
            }
          }
        }
      }
    },
    "/api/orders": {
      "post": {
        "tags": ["Orders"],
        "summary": "Place a new order",
        "description": "Creates a new pizza order. Requires a customer name (`sender`) and at least one item in `contents`.",
        "operationId": "createOrder",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/CreateOrderRequest" },
              "examples": {
                "single_item": {
                  "summary": "Single item order",
                  "value": { "sender": "Alice", "contents": [{ "name": "Pepperoni Pizza", "quantity": 2 }] }
                },
                "multiple_items": {
                  "summary": "Multiple items order",
                  "value": { "sender": "Bob", "contents": [{ "name": "Margherita Pizza", "quantity": 1 }, { "name": "BBQ Chicken Pizza", "quantity": 2 }] }
                }
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Order created successfully",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": { "type": "boolean", "example": true },
                    "data": { "$ref": "#/components/schemas/Order" }
                  }
                }
              }
            }
          },
          "400": {
            "description": "Validation error — missing `sender` or empty/missing `contents`",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ErrorResponse" },
                "examples": {
                  "missing_sender": { "summary": "Missing sender field", "value": { "success": false, "message": "Field 'sender' is required." } },
                  "empty_contents": { "summary": "Empty contents array", "value": { "success": false, "message": "Field 'contents' must be a non-empty array." } }
                }
              }
            }
          }
        }
      }
    },
    "/api/orders/{id}": {
      "get": {
        "tags": ["Orders"],
        "summary": "Get order by ID",
        "description": "Retrieves the details of an existing order including its status and items.",
        "operationId": "getOrder",
        "parameters": [{ "$ref": "#/components/parameters/OrderId" }],
        "responses": {
          "200": {
            "description": "Order found",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": { "type": "boolean", "example": true },
                    "data": { "$ref": "#/components/schemas/Order" }
                  }
                }
              }
            }
          },
          "404": {
            "description": "Order not found",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/ErrorResponse" }, "example": { "success": false, "message": "Order not found." } } }
          }
        }
      },
      "put": {
        "tags": ["Orders"],
        "summary": "Update order status",
        "description": "Updates the status of an existing order.\n\n**Valid transitions:**\n- `RECEIVED` → `DELIVERING`\n- `RECEIVED` → `CANCELED`\n- `DELIVERING` → `DELIVERED`",
        "operationId": "updateOrderStatus",
        "parameters": [{ "$ref": "#/components/parameters/OrderId" }],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/UpdateOrderStatusRequest" },
              "examples": {
                "mark_delivering": { "summary": "Mark as Delivering", "value": { "status": "DELIVERING" } },
                "mark_delivered": { "summary": "Mark as Delivered", "value": { "status": "DELIVERED" } },
                "cancel_order": { "summary": "Cancel Order", "value": { "status": "CANCELED" } }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Order status updated successfully",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": { "type": "boolean", "example": true },
                    "data": { "$ref": "#/components/schemas/Order" }
                  }
                }
              }
            }
          },
          "400": {
            "description": "Invalid status value",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/ErrorResponse" }, "example": { "success": false, "message": "Invalid status. Valid values are: RECEIVED, DELIVERING, DELIVERED, CANCELED." } } }
          },
          "404": {
            "description": "Order not found",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/ErrorResponse" }, "example": { "success": false, "message": "Order not found." } } }
          }
        }
      }
    }
  },
  "components": {
    "parameters": {
      "OrderId": {
        "name": "id",
        "in": "path",
        "required": true,
        "description": "The unique identifier of the order",
        "schema": { "type": "string", "example": "order-a1b2c3d4" }
      }
    },
    "schemas": {
      "MenuItem": {
        "type": "object",
        "required": ["id", "name", "description", "image"],
        "properties": {
          "id": { "type": "string", "example": "pizza-001" },
          "name": { "type": "string", "example": "Margherita Pizza" },
          "description": { "type": "string", "example": "Classic tomato sauce, mozzarella, and fresh basil." },
          "image": { "type": "string", "example": "/images/margherita.jpg" }
        }
      },
      "OrderItem": {
        "type": "object",
        "required": ["name", "quantity"],
        "properties": {
          "name": { "type": "string", "example": "Pepperoni Pizza" },
          "quantity": { "type": "integer", "minimum": 1, "example": 2 }
        }
      },
      "Order": {
        "type": "object",
        "required": ["id", "sender", "status", "contents"],
        "properties": {
          "id": { "type": "string", "example": "order-a1b2c3d4" },
          "sender": { "type": "string", "example": "Alice" },
          "status": { "$ref": "#/components/schemas/OrderStatus" },
          "contents": { "type": "array", "items": { "$ref": "#/components/schemas/OrderItem" } }
        }
      },
      "OrderStatus": {
        "type": "string",
        "enum": ["RECEIVED", "DELIVERING", "DELIVERED", "CANCELED"],
        "example": "RECEIVED"
      },
      "CreateOrderRequest": {
        "type": "object",
        "required": ["sender", "contents"],
        "properties": {
          "sender": { "type": "string", "example": "Alice" },
          "contents": { "type": "array", "minItems": 1, "items": { "$ref": "#/components/schemas/OrderItem" } }
        }
      },
      "UpdateOrderStatusRequest": {
        "type": "object",
        "required": ["status"],
        "properties": {
          "status": { "$ref": "#/components/schemas/OrderStatus" }
        }
      },
      "ErrorResponse": {
        "type": "object",
        "required": ["success", "message"],
        "properties": {
          "success": { "type": "boolean", "example": false },
          "message": { "type": "string", "example": "Order not found." }
        }
      }
    }
  }
};

      window.onload = function () {
        SwaggerUIBundle({
          spec: spec,
          dom_id: "#swagger-ui",
          presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIBundle.SwaggerUIStandalonePreset,
          ],
          layout: "BaseLayout",
          deepLinking: true,
          tryItOutEnabled: true,
        });
      };
    </script>
  </body>
</html>
